<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#1a1028"/>
  <!-- Anvil base -->
  <rect x="30" y="75" width="60" height="10" rx="3" fill="url(#fg)" opacity="0.9"/>
  <rect x="38" y="68" width="44" height="10" rx="3" fill="url(#fg)" opacity="0.8"/>
  <!-- Hammer -->
  <rect x="54" y="28" width="6" height="38" rx="2" fill="#d4d4d8" filter="url(#glow)"/>
  <rect x="42" y="22" width="30" height="12" rx="4" fill="url(#fg)"/>
  <!-- Sparks -->
  <circle cx="38" cy="58" r="2.5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="78" cy="52" r="2" fill="#fb923c" opacity="0.8"/>
  <circle cx="44" cy="48" r="1.5" fill="#fcd34d" opacity="0.7"/>
  <circle cx="82" cy="62" r="1.8" fill="#f97316" opacity="0.6"/>
</svg>
